name: Build and Push to Production Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Static Files
        run: rm -rf app/api

      - name: Build Next.js
        env:
          STATIC_EXPORT: "true"
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          # Copy deployment configurations so they land in public_html root on checkout
          cp .htaccess out/
          cp .cpanel.yml out/

      - name: Deploy to production branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: production
          clean: true
